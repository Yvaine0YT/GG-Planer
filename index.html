<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorqueTerror RL Planner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="sidebar">
        <h2 id="logo-title">RL Planner</h2>
        <nav>
            <button onclick="showSection('dashboard')">Alle Turniere 🌐</button>
            <button id="nav-create" onclick="showSection('create')" style="display:none;">Turnier erstellen 🏆</button>
            <button id="nav-teams" onclick="showSection('teams')" style="display:none;">Mein Team 🚗</button>
            <button id="nav-profile" onclick="showSection('profile')" style="display:none;">Mein Profil 👤</button>
        </nav>
        <div id="auth-section">
            <button id="login-btn" class="action-btn" onclick="loginWithDiscord()">Mit Discord anmelden</button>
            <button id="logout-btn" class="action-btn" onclick="logout()" style="display:none;">Abmelden</button>
        </div>
    </div>

    <main class="content">
        <div id="status-message" class="status-popup"></div>

        <section id="dashboard" class="active">
            <h1>Aktive Rocket League Turniere</h1>
            <div id="tournament-list" class="grid"></div>
        </section>

        <section id="create">
            <h1>Neues Turnier starten</h1>
            <div class="form-group">
                <input type="text" id="t-name" placeholder="Name des Turniers">
                <select id="t-mode">
                    <option value="1v1">1 vs 1 (Solo)</option>
                    <option value="2v2">2 vs 2 (Duos)</option>
                    <option value="3v3">3 vs 3 (Standard)</option>
                </select>
                <button class="action-btn" onclick="saveTournament()">Turnier veröffentlichen</button>
            </div>
        </section>

        <section id="teams">
            <h1>Mein Team verwalten</h1>
            <div class="form-group">
                <input type="text" id="team-name" placeholder="Team Name (z.B. Nova Esports)">
                <button class="action-btn" onclick="createTeam()">Team erstellen</button>
            </div>
            <h2>Deine Teams</h2>
            <ul id="my-teams-list"></ul>
        </section>

        <section id="profile">
            <h1>Dein Profil</h1>
            <div class="profile-card">
                <img id="profile-avatar" src="" alt="Avatar" style="width:100px; height:100px; border-radius:50%; display:none; border: 2px solid var(--accent);">
                <div class="form-group" style="margin-top: 20px;">
                    <label>Anzeigename:</label><br>
                    <input type="text" id="profile-username" placeholder="Dein Name">
                </div>
                <div class="form-group">
                    <label>Rocket League Tracker Daten (Wichtig für Turniere):</label><br>
                    <select id="profile-platform">
                        <option value="epic">Epic Games</option>
                        <option value="steam">Steam</option>
                    </select>
                    <input type="text" id="profile-gaming-name" placeholder="Epic/Steam Username">
                </div>
                <button class="action-btn" onclick="updateProfile()">Profil speichern</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
